<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Persona AI Chatroom</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- ============================================================
         Setup screen: pick personas + enter a topic
         ============================================================ -->
    <div id="setup-screen" class="screen active">
        <div class="setup-container">
            <h1>🎭 Multi-Persona AI Chatroom</h1>
            <p class="tagline">Host a discussion between historical figures, and join in yourself.</p>

            <div class="section">
                <label class="section-label">1. Choose participants</label>
                <div id="persona-picker" class="persona-picker">
                    <!-- Filled in by JS -->
                </div>
            </div>

            <div class="section">
                <label class="section-label" for="topic-input">2. Discussion topic</label>
                <input
                    id="topic-input"
                    type="text"
                    placeholder="e.g. Will AI replace humanity?"
                    autocomplete="off"
                />
            </div>

            <button id="start-btn" class="primary-btn">Start the discussion →</button>
        </div>
    </div>

    <!-- ============================================================
         Chat screen
         ============================================================ -->
    <div id="chat-screen" class="screen">
        <header class="chat-header">
            <div class="chat-header-left">
                <button id="back-btn" class="icon-btn" title="New discussion">←</button>
                <div>
                    <div class="topic-label">Topic</div>
                    <div id="topic-display" class="topic-text"></div>
                </div>
            </div>
            <div id="active-personas" class="active-personas"></div>
        </header>

        <main id="messages" class="messages">
            <!-- Messages appear here -->
        </main>

        <footer class="composer">
            <div id="persona-buttons" class="persona-buttons">
                <!-- Filled in by JS -->
            </div>

            <div class="input-row">
                <input
                    id="user-input"
                    type="text"
                    placeholder="Type your message to chime in..."
                    autocomplete="off"
                />
                <button id="send-btn" class="primary-btn small">Send</button>
            </div>

            <div class="hint">
                Tip: type a message and press Enter to chime in. Click a persona's button to let them speak next.
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
